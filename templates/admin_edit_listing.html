{% extends 'base.html' %}

{% block title %}Edit Listing{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Edit Listing</h1>
            <p class="text-muted">Update listing details and assign a landlord.</p>
        </div>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control" value="{{ listing['title'] }}" disabled>
                </div>

                <div class="mb-3">
                    <label for="type" class="form-label">Type</label>
                    <select id="type" name="type" class="form-select" required>
                        {% for category in listing_types %}
                        <option value="{{ category }}" {% if category == listing['type'] %}selected{% endif %}>
                            {{ category }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="location" class="form-label">Location</label>
                    <input id="location" name="location" type="text" class="form-control" value="{{ listing['location'] }}" required>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label">Price (₱)</label>
                    <input id="price" name="price" type="number" step="0.01" min="0" class="form-control" value="{{ listing['price'] }}" required>
                </div>

                <div class="mb-3">
                    <label for="landlord_id" class="form-label">Landlord</label>
                    <select id="landlord_id" name="landlord_id" class="form-select">
                        <option value="">No landlord assigned</option>
                        {% for landlord in landlords %}
                        <option value="{{ landlord['id'] }}" {% if landlord['id'] == listing['landlord_id'] %}selected{% endif %}>
                            {{ landlord['name'] }} ({{ landlord['email'] }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Save Changes</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
