{% extends 'base.html' %}

{% block title %}Register as Landlord{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm rounded-4">
      <div class="card-body p-5">
        <h2 class="mb-4">Register as Landlord</h2>
        <form method="POST" action="{{ url_for('register_landlord') }}">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control rounded-pill" placeholder="Your full name" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control rounded-pill" placeholder="you@example.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Company</label>
            <input type="text" name="company" class="form-control rounded-pill" placeholder="Your company name" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-control rounded-pill" placeholder="Your phone number" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control rounded-pill" placeholder="Password" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control rounded-pill" placeholder="Confirm password" required />
          </div>
          <button type="submit" class="btn btn-success w-100 rounded-pill">Register</button>
        </form>
        <p class="text-center text-muted mt-4">Already have an account? <a href="{{ url_for('login') }}">Log In</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
