{% extends 'base.html' %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm rounded-4">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <img src="{{ url_for('static', filename='Logo.png') }}" alt="Zzzpace logo" class="navbar-brand-icon mb-3" style="width: 64px; height: 64px;" />
          <h2 class="mb-4">Welcome back</h2>
        </div>
        <form method="POST" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control rounded-pill" placeholder="you@example.com" required />
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control rounded-pill" placeholder="Password" required />
          </div>
          <button type="submit" class="btn btn-success w-100 rounded-pill">Log In</button>
        </form>

        <div class="divider my-4 text-center">Create a new account</div>
        <div class="d-grid gap-3">
          <a href="{{ url_for('register') }}" class="btn btn-outline-success rounded-pill"><i class="bi bi-person-plus me-2"></i>Create Account</a>
        </div>


      </div>
    </div>
  </div>
</div>
{% endblock %}
